name: Semgrep SAST
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 12 * * 1'
jobs:
  semgrep:
    name: Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          semgrep scan --config auto --error \
            --exclude-rule "javascript.lang.security.audit.detect-non-literal-regexp.detect-non-literal-regexp" \
            --exclude-rule "javascript.browser.security.wildcard-postmessage-configuration.wildcard-postmessage-configuration"
