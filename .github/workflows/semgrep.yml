name: Semgrep SAST
on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
  schedule:
    - cron: '0 12 * * 1'
jobs:
  semgrep:
    name: Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Semgrep (baseline for PRs)
        if: github.event_name == 'pull_request'
        run: semgrep scan --config auto --error --baseline-ref ${{ github.event.pull_request.base.sha }}
      - name: Run Semgrep (full scan for push/schedule)
        if: github.event_name != 'pull_request'
        run: semgrep scan --config auto
